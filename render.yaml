services:
  - type: web
    name: squarespell-backend
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: APP_URL
        sync: false
      - key: MARKETING_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REPORT_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_STARTER_PRICE_ID
        sync: false
      - key: STRIPE_AGENCY_PRICE_ID
        sync: false
      - key: STRIPE_PRO_YEARLY_PRICE_ID
        sync: false
      - key: STRIPE_STARTER_YEARLY_PRICE_ID
        sync: false
      - key: STRIPE_AGENCY_YEARLY_PRICE_ID
        sync: false
      - key: ADMIN_EMAILS
        sync: false
    healthCheckPath: /health
    autoDeploy: true

  # Cron job: process scheduled email campaigns every 5 minutes
  - type: cron
    name: squarespell-scheduled-sends
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/5 * * * *"
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: >
      node -e "
        const https = require('https');
        const url = process.env.BACKEND_URL || 'https://squarespell-api.onrender.com';
        const data = JSON.stringify({});
        const req = https.request(url + '/api/cron/process-scheduled-sends', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-cron-secret': process.env.CRON_SECRET || ''
          }
        }, (res) => {
          let body = '';
          res.on('data', c => body += c);
          res.on('end', () => {
            console.log('Status:', res.statusCode, body);
            process.exit(res.statusCode === 200 ? 0 : 1);
          });
        });
        req.on('error', (e) => { console.error(e); process.exit(1); });
        req.write(data);
        req.end();
      "
    envVars:
      - key: BACKEND_URL
        sync: false
      - key: CRON_SECRET
        sync: false
