<!--
  ═══════════════════════════════════════════════════════════════
  SQUARESPELL QUIZ — PRICING EMBED FOR SQUARESPACE
  ═══════════════════════════════════════════════════════════════

  HOW TO USE:
  1. In Squarespace, add a "Code Block" to any page.
  2. Paste everything below into that Code Block.
  3. Save and Publish.

  The widget loads your live plan cards, handles the
  Monthly / Annual toggle, and sends users to sign-up
  or directly to Stripe checkout if they're already signed in.
  ═══════════════════════════════════════════════════════════════
-->

<div id="sq-pricing-wrapper" style="width:100%;max-width:1160px;margin:0 auto;">
  <iframe
    id="sq-pricing-frame"
    src="https://app.squarespell.com/pricing-embed"
    width="100%"
    height="900"
    frameborder="0"
    scrolling="no"
    allowtransparency="true"
    allow="payment"
    title="Squarespell Quiz Pricing"
    style="border:none;display:block;width:100%;background:transparent;transition:height .25s ease;"
  ></iframe>
</div>

<script>
  (function () {
    var frame = document.getElementById('sq-pricing-frame');
    if (!frame) return;
    window.addEventListener('message', function (e) {
      if (e.origin !== 'https://app.squarespell.com') return;
      if (!e.data || e.data.type !== 'sq-price-height') return;
      // 48px buffer so card shadow / hover lift never clips
      frame.height = e.data.height + 48;
    });
  })();
</script>

<!--
  USER FLOW:
    Click "Start free trial" on any plan
      → Not signed in : taken to https://app.squarespell.com/sign-up
      → Already signed in : Stripe checkout opens for that plan

  WANT MONTHLY AS DEFAULT?
    Change iframe src to:
      https://app.squarespell.com/pricing-embed?interval=monthly
-->
