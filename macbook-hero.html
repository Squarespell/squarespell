<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squarespell Quiz — Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:#0A0A0B;
  font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow-x:hidden;
  color:#fff;
}

/* ── SCROLL SPACER so animation has room ── */
.scroll-stage{
  height:300vh;
  position:relative;
}

/* ── STICKY CONTAINER ── */
.sticky-wrap{
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* ── BACKGROUND GLOW ── */
.bg-glow{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 50% 60%, rgba(13,115,119,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(13,115,119,0.10) 0%, transparent 60%);
  opacity:0;
  transition:opacity 0.4s;
}
.bg-glow.lit{opacity:1;}

/* ── SCENE ── */
.scene{
  perspective:1800px;
  perspective-origin:50% 40%;
  width:900px;
  max-width:95vw;
  position:relative;
}

/* ── MACBOOK GROUP ── */
.macbook{
  transform-style:preserve-3d;
  transform:rotateX(8deg) rotateY(-4deg);
  position:relative;
  width:100%;
}

/* ── BASE (keyboard body) ── */
.base{
  width:100%;
  padding-bottom:63.5%;/* aspect ratio of MacBook base */
  position:relative;
  transform-style:preserve-3d;
}

/* Top face of base (keyboard deck) */
.base-top{
  position:absolute;
  inset:0;
  background:
    linear-gradient(160deg,#E8E8E8 0%,#D4D4D4 30%,#C8C8C8 60%,#BCBCBC 100%);
  border-radius:14px 14px 10px 10px;
  transform:translateZ(0px);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.15) inset,
    0 -1px 0 rgba(0,0,0,0.3) inset;
  overflow:hidden;
}

/* Keyboard grid on base */
.keyboard-grid{
  position:absolute;
  top:18%;left:8%;right:8%;
  height:52%;
  display:grid;
  grid-template-rows:repeat(4,1fr);
  gap:5px;
  opacity:0.7;
}
.key-row{
  display:grid;
  gap:5px;
}
.key-row:nth-child(1){grid-template-columns:repeat(13,1fr);}
.key-row:nth-child(2){grid-template-columns:repeat(12,1fr) 1.5fr;}
.key-row:nth-child(3){grid-template-columns:1.3fr repeat(11,1fr) 1.3fr;}
.key-row:nth-child(4){grid-template-columns:1.5fr 1.2fr 5fr 1.2fr 1.2fr 1.5fr;}
.key{
  background:linear-gradient(145deg,#D0D0D0,#B8B8B8);
  border-radius:3px;
  box-shadow:0 1px 0 rgba(0,0,0,0.25),0 0 0 0.5px rgba(0,0,0,0.15);
}

/* Trackpad */
.trackpad{
  position:absolute;
  bottom:12%;
  left:50%;
  transform:translateX(-50%);
  width:26%;
  height:16%;
  background:linear-gradient(145deg,#CCCCCC,#B5B5B5);
  border-radius:8px;
  box-shadow:0 0 0 0.5px rgba(0,0,0,0.2),0 2px 4px rgba(0,0,0,0.15) inset;
}

/* Front edge of base */
.base-front{
  position:absolute;
  bottom:-8px;
  left:0;right:0;
  height:8px;
  background:linear-gradient(to bottom,#A8A8A8,#989898);
  border-radius:0 0 6px 6px;
  transform:rotateX(-90deg);
  transform-origin:top center;
}

/* Shadow under MacBook */
.base-shadow{
  position:absolute;
  bottom:-40px;
  left:5%;right:5%;
  height:50px;
  background:radial-gradient(ellipse,rgba(0,0,0,0.6) 0%,transparent 70%);
  filter:blur(16px);
  transform:rotateX(90deg) translateZ(-10px);
  transform-origin:top center;
}

/* ── LID (screen) ── */
.lid{
  position:absolute;
  top:0;left:0;right:0;
  padding-bottom:63.5%;
  transform-style:preserve-3d;
  transform-origin:50% 100%;/* hinge at bottom of lid */
  /* Start closed: flat on base */
  transform:rotateX(0deg);
  transition:none;
}

/* Back face of lid (Apple logo side) */
.lid-back{
  position:absolute;
  inset:0;
  background:
    linear-gradient(160deg,#E0E0E0 0%,#CCCCCC 40%,#C0C0C0 100%);
  border-radius:14px 14px 4px 4px;
  backface-visibility:visible;
  transform:rotateX(180deg) translateZ(1px);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.lid-back::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 50%,rgba(0,0,0,0.05) 100%);
}

/* Apple logo */
.apple-logo{
  width:12%;
  opacity:0.6;
  position:relative;
  z-index:1;
}

/* Screen face (front of lid) */
.lid-front{
  position:absolute;
  inset:0;
  background:#111;
  border-radius:14px 14px 4px 4px;
  backface-visibility:hidden;
  overflow:hidden;
  display:flex;
  align-items:stretch;
  justify-content:stretch;
}

/* Screen bezel */
.bezel{
  position:absolute;
  inset:0;
  background:#0D0D0D;
  border-radius:14px 14px 4px 4px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:3% 2% 2%;
}

/* Notch */
.notch{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:13%;
  height:4%;
  background:#0D0D0D;
  border-radius:0 0 10px 10px;
  z-index:10;
}
.camera-dot{
  position:absolute;
  top:35%;left:50%;
  transform:translate(-50%,-50%);
  width:8px;height:8px;
  border-radius:50%;
  background:#1a1a1a;
  border:1px solid #333;
}

/* Display area */
.display{
  width:100%;
  height:100%;
  border-radius:10px;
  overflow:hidden;
  position:relative;
  background:#0A0A0B;
}

/* Dashboard screenshot */
.dashboard-img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:top left;
  opacity:0;
  transition:opacity 0.8s ease 0.2s;
  display:block;
}
.dashboard-img.visible{opacity:1;}

/* Screen power-on flash */
.screen-flash{
  position:absolute;
  inset:0;
  background:#fff;
  border-radius:10px;
  opacity:0;
  pointer-events:none;
  z-index:5;
}
.screen-flash.flash{
  animation:screenFlash 0.6s ease forwards;
}
@keyframes screenFlash{
  0%{opacity:0;}
  10%{opacity:0.8;}
  30%{opacity:0.3;}
  50%{opacity:0.6;}
  100%{opacity:0;}
}

/* Screen ambient glow */
.screen-glow{
  position:absolute;
  bottom:-30px;
  left:10%;right:10%;
  height:60px;
  background:radial-gradient(ellipse,rgba(13,115,119,0.5) 0%,transparent 70%);
  filter:blur(20px);
  opacity:0;
  transition:opacity 1s ease;
  pointer-events:none;
  z-index:-1;
}
.screen-glow.on{opacity:1;}

/* Reflection on lid */
.lid-reflection{
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 50%);
  border-radius:14px 14px 4px 4px;
  pointer-events:none;
  z-index:2;
}

/* ── TEXT OVERLAY (shown before scroll) ── */
.hero-label{
  position:absolute;
  bottom:12%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  white-space:nowrap;
  opacity:1;
  transition:opacity 0.4s;
  pointer-events:none;
}
.hero-label.hide{opacity:0;}
.hero-label p{
  font-size:14px;
  color:rgba(255,255,255,0.4);
  letter-spacing:0.1em;
  text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.scroll-arrow{
  display:inline-block;
  animation:bounce 1.4s ease infinite;
}
@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(5px);}
}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .scene{width:95vw;}
  .keyboard-grid{display:none;}
}
</style>
</head>

<script>
// Fill keyboard rows
(function(){
  var counts = [13,13,13,6];
  ['r1','r2','r3','r4'].forEach(function(id,i){
    var row = document.getElementById(id);
    for(var k=0;k<counts[i];k++){
      var key = document.createElement('div');
      key.className='key';
      row.appendChild(key);
    }
  });
})();

var lid       = document.getElementById('lid');
var dashImg   = document.getElementById('dashImg');
var screenFlash = document.getElementById('screenFlash');
var screenGlow  = document.getElementById('screenGlow');
var bgGlow    = document.getElementById('bgGlow');
var heroLabel = document.getElementById('heroLabel');

var screenOn  = false;

function easeInOutCubic(t){
  return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
}

function onScroll(){
  var scrollY   = window.scrollY;
  var maxScroll = document.documentElement.scrollHeight - window.innerHeight;
  // Use first 65% of scroll for the opening animation
  var progress  = Math.min(1, scrollY / (maxScroll * 0.65));
  var eased     = easeInOutCubic(progress);

  // Lid goes from 0deg (closed/flat) to -128deg (fully open)
  var angle = -128 * eased;
  lid.style.transform = 'rotateX(' + angle + 'deg)';

  // Hide scroll hint after 5% scroll
  if(progress > 0.05){
    heroLabel.classList.add('hide');
  } else {
    heroLabel.classList.remove('hide');
  }

  // Screen turns on at 70% of animation
  if(eased > 0.70 && !screenOn){
    screenOn = true;
    screenFlash.classList.add('flash');
    setTimeout(function(){
      dashImg.classList.add('visible');
      screenGlow.classList.add('on');
      bgGlow.classList.add('lit');
    }, 300);
  }
  if(eased < 0.65 && screenOn){
    screenOn = false;
    dashImg.classList.remove('visible');
    screenFlash.classList.remove('flash');
    screenGlow.classList.remove('on');
    bgGlow.classList.remove('lit');
  }
}

window.addEventListener('scroll', onScroll, {passive:true});
onScroll();
</script>
